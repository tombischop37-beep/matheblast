<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050010"/>
      <stop offset="100%" style="stop-color:#1A003A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <line x1="256" y1="340" x2="40" y2="490" stroke="rgba(0,255,255,0.12)" stroke-width="1.5"/>
  <line x1="256" y1="340" x2="120" y2="490" stroke="rgba(0,255,255,0.12)" stroke-width="1.5"/>
  <line x1="256" y1="340" x2="256" y2="490" stroke="rgba(0,255,255,0.12)" stroke-width="1.5"/>
  <line x1="256" y1="340" x2="392" y2="490" stroke="rgba(0,255,255,0.12)" stroke-width="1.5"/>
  <line x1="256" y1="340" x2="472" y2="490" stroke="rgba(0,255,255,0.12)" stroke-width="1.5"/>
  <line x1="40" y1="390" x2="472" y2="390" stroke="rgba(0,255,255,0.08)" stroke-width="1.5"/>
  <line x1="20" y1="440" x2="492" y2="440" stroke="rgba(0,255,255,0.08)" stroke-width="1.5"/>
  <rect x="0" y="328" width="512" height="30" fill="rgba(255,0,170,0.12)"/>
  <text x="256" y="210" font-family="monospace" font-size="140" font-weight="bold" fill="#00FFFF"

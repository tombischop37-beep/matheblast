<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050010"/>
      <stop offset="100%" style="stop-color:#1A003A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="96" y1="130" x2="20" y2="180" stroke="rgba(0,255,255,0.15)" stroke-width="1"/>
  <line x1="96" y1="130" x2="50" y2="180" stroke="rgba(0,255,255,0.15)" stroke-width="1"/>
  <line x1="96" y1="130" x2="96" y2="180" stroke="rgba(0,255,255,0.15)" stroke-width="1"/>
  <line x1="96" y1="130" x2="142" y2="180" stroke="rgba(0,255,255,0.15)" stroke-width="1"/>
  <line x1="96" y1="130" x2="172" y2="180" stroke="rgba(0,255,255,0.15)" stroke-width="1"/>
  <line x1="20" y1="148" x2="172" y2="148" stroke="rgba(0,255,255,0.1)" stroke-width="1"/>
  <line x1="10" y1="165" x2="182" y2="165" stroke="rgba(0,255,255,0.1)" stroke-width="1"/>
  <!-- Glow horizon -->
  <rect x="0" y="124" width="192" height="12" fill="rgba(255,0,170,0.15)" rx="0"/>
  <!-- MB text -->
  <text x="96" y="75" font-family="monospace" font-size="52" font-weight="bold" fill="#00FFFF"
    text-anchor="middle" filter="url(#glow)" letter-spacing="2">MB</text>
  <!-- Sub text -->
  <text x="96" y="105" font-family="monospace" font-size="14" fill="#FF00AA"
    text-anchor="middle" letter-spacing="4">BLAST</text>
  <!-- Border -->
  <rect width="192" height="192" rx="32" fill="none" stroke="rgba(0,255,255,0.3)" stroke-width="2"/>
</svg>
